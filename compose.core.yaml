services:
  core:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    env_file:
      - ./docker/openclaw/.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.core.rule=PathPrefix(`/`)
      - traefik.http.routers.core.entrypoints=web
      - traefik.http.services.core.loadbalancer.server.port=80
      - traefik.http.middlewares.edge-auth.forwardauth.address=http://core/edge/auth/verify
      - traefik.http.middlewares.edge-auth.forwardauth.trustForwardHeader=true
    environment:
      LANGFUSE_ENABLED: "true"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
      ADMIN_OPENCLAW_URL: http://localhost:8082
      ADMIN_LANGFUSE_URL: http://localhost:8086
      ADMIN_TRAEFIK_URL: http://localhost:8080/dashboard/
      ADMIN_LITELLM_URL: http://localhost:4000
      EDGE_AUTH_JWT_SECRET: dev-edge-auth-secret-change-me
      EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
      EDGE_AUTH_TOKEN_TTL: 43200
      EDGE_AUTH_LOGIN_BASE_URL: http://localhost
    volumes:
      - ./apps/core:/var/www/html
    networks:
      - dev-edge
